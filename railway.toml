[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[build.env]
PYTHON_VERSION = "3.11"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
timeout = 10
interval = 30
